<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planar — Die Seite ist umgezogen</title>
  <meta name="description" content="Planar ist umgezogen. Die Anwendung ist jetzt unter planar.samuelbauer.at erreichbar." />

  <link rel="canonical" href="https://planar.samuelbauer.at" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* ============ Design tokens (aus Planar) ============ */
    :root {
      --bg:            #f6f6f4;
      --surface:       #ffffff;
      --surface-2:     #f6f6f4;
      --surface-3:     #ededea;
      --border:        #e3e2de;
      --border-strong: #c9c8c3;
      --text:          #1b1b18;
      --text-dim:      #5d5c57;
      --text-faint:    #94938d;
      --accent:        #1b1b18;
      --main-color:    #2878a0;
      --success:       #2e7a3c;
      --mono: "JetBrains Mono", Consolas, "Courier New", monospace;
      --shadow-lg: 0 4px 16px rgba(27,27,24,0.08);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      background:
        radial-gradient(circle at 1px 1px, rgba(27,27,24,0.05) 1px, transparent 0) 0 0 / 24px 24px,
        var(--bg);
      color: var(--text);
      font-family: "Instrument Sans", "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    /* ============ Karte ============ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 40px 28px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
      animation: rise 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; }
    }

    /* ============ Brand ============ */
    .brand { display: flex; align-items: center; gap: 14px; margin-bottom: 30px; }
    .brand-mark {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      color: #fff;
      flex: 0 0 auto;
    }
    .brand-mark svg { width: 22px; height: 22px; }
    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-name { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
    .brand-sub  { font-size: 12.5px; color: var(--text-faint); }

    /* ============ Inhalt ============ */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-faint);
      border: 1px solid var(--border);
      background: var(--surface-2);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    .eyebrow .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--main-color);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 8px;
      line-height: 1.2;
    }
    .lead {
      font-size: 14px;
      color: var(--text-dim);
      margin: 0 0 24px;
      max-width: 42ch;
    }

    /* Adress-Readout im Instrument-Stil */
    .address-field {
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 14px 16px;
      margin-bottom: 22px;
    }
    .address-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid; place-items: center;
      flex: 0 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
    }
    .address-icon svg { width: 16px; height: 16px; }
    .address-body { min-width: 0; }
    .address-label {
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.02em;
      margin-bottom: 2px;
    }
    .address-url {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      word-break: break-all;
    }

    /* Button */
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--border-strong);
      background: var(--surface);
      color: var(--text);
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn svg { width: 15px; height: 15px; }
    .btn:hover { border-color: var(--text); }
    .btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn.primary:hover { background: #333330; border-color: #333330; }

    /* Statuszeile (analog zur App-Statusbar) */
    .statusline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 26px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-faint);
    }
    .statusline .ok-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      flex: 0 0 auto;
    }
    .statusline .lbl { color: var(--text-faint); }
    .statusline .val { color: var(--text-dim); font-family: var(--mono); }
    .statusline .spacer { flex: 1; }
    #countdown { color: var(--text-dim); font-family: var(--mono); }

    @media (max-width: 480px) {
      .card { padding: 30px 24px 22px; }
      h1 { font-size: 21px; }
      .btn { flex: 1; }
    }
  </style>
</head>
<body>

  <main class="card" role="main">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7"/>
          <path d="M3 7l9-4 9 4"/>
          <path d="M9 12l3 2 3-2"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">Planar</div>
        <div class="brand-sub">Bildflächen-Messung</div>
      </div>
    </div>

    <h1>Diese Seite ist umgezogen</h1>
    <p class="lead">
      Planar ist ab sofort unter einer neuen, festen Adresse erreichbar.
      Bitte aktualisieren Sie Ihre Lesezeichen.
    </p>

    <a class="address-field" href="https://planar.samuelbauer.at" aria-label="Neue Adresse öffnen: planar.samuelbauer.at" style="text-decoration:none;color:inherit;">
      <div class="address-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <div class="address-body">
        <div class="address-label">Neue Adresse</div>
        <div class="address-url">planar.samuelbauer.at</div>
      </div>
    </a>

    <div class="actions">
      <a class="btn primary" href="https://planar.samuelbauer.at" id="goBtn">
        Zur neuen Adresse
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/>
          <polyline points="12 5 19 12 12 19"/>
        </svg>
      </a>
    </div>
  </main>

</body>
</html>
